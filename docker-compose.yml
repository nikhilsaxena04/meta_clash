version: '3.8'

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: meta_clash
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    environment:
      - PORT=8080
      - DATABASE_URL=postgres://postgres:postgrespassword@db:5432/meta_clash?sslmode=disable
      - JWT_SECRET=super_secret_dev_key_12345
      - JWT_EXPIRY=24h
      - JIKAN_BASE_URL=https://api.jikan.moe/v4
      - JIKAN_TIMEOUT=5s
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: ./frontend
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8080
      - NEXT_PUBLIC_WS_URL=ws://localhost:8080/api/ws
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  pgdata:
